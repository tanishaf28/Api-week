
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #vibeRoot {
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 18px;
    position: relative;
    overflow: hidden;
    background: #0d1117;
  }

  /* Sky layers */
  .sky {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(180deg,
      #0a0e18 0%,
      #101828 30%,
      #1a2540 60%,
      #1e2e45 100%
    );
  }

  /* Aurora shimmer */
  .aurora {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 120% 40% at 20% 0%, rgba(56,189,156,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 100% 35% at 80% 5%, rgba(99,102,241,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 80% 30% at 50% 0%, rgba(59,130,246,0.06) 0%, transparent 50%);
    animation: auroraShift 18s ease-in-out infinite alternate;
  }
  @keyframes auroraShift {
    0%   { opacity: 0.7; transform: translateX(-4%) scaleY(1); }
    50%  { opacity: 1;   transform: translateX(4%)  scaleY(1.15); }
    100% { opacity: 0.6; transform: translateX(-2%) scaleY(0.9); }
  }

  /* Fog layers */
  .fog-layer {
    position: fixed; z-index: 2;
    width: 200%; height: 180px;
    bottom: -30px; left: -50%;
    border-radius: 50%;
    filter: blur(40px);
    pointer-events: none;
  }
  .fog-1 {
    background: radial-gradient(ellipse at center, rgba(180,210,240,0.07) 0%, transparent 70%);
    animation: fogDrift 28s ease-in-out infinite;
  }
  .fog-2 {
    background: radial-gradient(ellipse at center, rgba(120,160,200,0.05) 0%, transparent 60%);
    bottom: 20%;
    animation: fogDrift 38s ease-in-out infinite reverse;
  }
  @keyframes fogDrift {
    0%,100% { transform: translateX(0); }
    50%      { transform: translateX(8%); }
  }

  /* Stars */
  .stars {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--minOp); transform: scale(1); }
    50%      { opacity: var(--maxOp); transform: scale(1.4); }
  }

  /* Rain canvas */
  #rainCanvas {
    position: fixed; inset: 0; z-index: 3;
    pointer-events: none;
    opacity: 0.55;
  }

  /* Window frame */
  .window-frame {
    position: fixed; inset: 0; z-index: 4;
    pointer-events: none;
    background:
      linear-gradient(to right, rgba(139,100,60,0.35) 0px, rgba(120,80,40,0.12) 28px, transparent 28px),
      linear-gradient(to left,  rgba(139,100,60,0.35) 0px, rgba(120,80,40,0.12) 28px, transparent 28px),
      linear-gradient(to bottom, rgba(139,100,60,0.35) 0px, rgba(120,80,40,0.12) 22px, transparent 22px),
      linear-gradient(to top,   rgba(139,100,60,0.35) 0px, rgba(120,80,40,0.12) 22px, transparent 22px);
  }
  /* Glass condensation */
  .condensation {
    position: fixed; inset: 0; z-index: 3;
    pointer-events: none;
    opacity: 0.4;
    background-image:
      radial-gradient(circle 1.5px at 12% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(circle 1px at 23% 42%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(circle 2px at 7% 68%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(circle 1px at 78% 31%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(circle 1.5px at 91% 55%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(circle 1px at 65% 72%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(circle 2px at 44% 18%, rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(circle 1px at 33% 84%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }

  /* Warm light glow from bottom (fireplace) */
  .warmth-glow {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 2;
    height: 35vh;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,140,60,0.12) 0%, transparent 70%);
    animation: flicker 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes flicker {
    0%,100% { opacity: 0.7; }
    25%      { opacity: 1; }
    50%      { opacity: 0.85; }
    75%      { opacity: 1.0; }
  }

  /* Main content */
  .content-wrap {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: rgba(15, 22, 36, 0.72);
    border: 1px solid rgba(150, 200, 255, 0.12);
    border-radius: 24px;
    padding: 38px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 0 80px rgba(59,130,246,0.04);
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(150, 200, 255, 0.2);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 48px 96px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 0 100px rgba(59,130,246,0.08);
  }

  /* Header */
  .header { text-align: center; margin-bottom: 28px; }
  .weather-icon-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .icon-orb {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    animation: orb-float var(--d, 3.5s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .icon-orb:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
  }
  .icon-orb.rain   { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.2); }
  .icon-orb.cloud  { background: rgba(148,163,184,0.12); border: 1px solid rgba(148,163,184,0.18); }
  .icon-orb.moon   { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.15); }
  .icon-orb.coffee { background: rgba(217,119,6,0.12); border: 1px solid rgba(217,119,6,0.2); }
  @keyframes orb-float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .card h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: 40px;
    font-weight: 600;
    color: #e2eaf4;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 17px;
    color: rgba(148,163,184,0.7);
    font-style: italic;
  }

  /* City chips */
  .chips {
    display: flex; flex-wrap: wrap; gap: 7px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .chip {
    padding: 6px 13px;
    border: 1px solid rgba(100,150,200,0.18);
    border-radius: 99px;
    font-size: 14px;
    color: rgba(180,210,240,0.7);
    cursor: pointer;
    background: rgba(30,50,80,0.4);
    transition: all 0.25s;
    font-weight: 500;
  }
  .chip:hover {
    background: rgba(59,130,246,0.15);
    border-color: rgba(59,130,246,0.35);
    color: #93c5fd;
    transform: translateY(-2px);
  }
  .chip.active {
    background: rgba(59,130,246,0.18);
    border-color: rgba(59,130,246,0.4);
    color: #bfdbfe;
  }

  /* Input row */
  .input-row {
    display: flex; gap: 10px;
    margin-bottom: 24px;
  }
  .input-row input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(100,150,200,0.2);
    border-radius: 12px;
    color: #e2eaf4;
    font-size: 18px;
    padding: 12px 16px;
    outline: none;
    transition: all 0.25s;
    font-family: inherit;
  }
  .input-row input:hover {
    border-color: rgba(148,163,184,0.32);
    background: rgba(255,255,255,0.06);
  }
  .input-row input::placeholder { color: rgba(148,163,184,0.4); }
  .input-row input:focus {
    border-color: rgba(59,130,246,0.45);
    background: rgba(59,130,246,0.05);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
  }
  .btn-check {
    padding: 12px 22px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 12px;
    color: #eff6ff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(37,99,235,0.25);
  }
  .btn-check:hover:not(:disabled) {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(59,130,246,0.35);
  }
  .btn-check:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Weather stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.4), transparent);
  }
  .stat-card:hover {
    background: rgba(59,130,246,0.07);
    border-color: rgba(59,130,246,0.2);
    transform: translateY(-3px);
  }
  .stat-val { font-size: 24px; font-weight: 600; color: #93c5fd; }
  .stat-lbl { font-size: 13px; color: rgba(148,163,184,0.6); margin-top: 3px; letter-spacing: 0.3px; }

  /* Vibe result */
  .vibe-box {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 28px;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
  }
  .vibe-box:hover {
    transform: translateY(-2px);
    border-color: rgba(148,163,184,0.16);
    background: rgba(255,255,255,0.04);
    box-shadow: 0 16px 40px rgba(0,0,0,0.22);
  }
  .vibe-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(148,163,184,0.2), transparent);
  }

  /* Sheen sweep */
  .vibe-box::after {
    content: '';
    position: absolute;
    width: 60%; height: 100%;
    top: 0; left: -60%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    animation: sweep 5s linear infinite;
  }
  @keyframes sweep {
    0%   { left: -60%; }
    100% { left: 120%; }
  }

  .vibe-empty { font-size: 18px; color: rgba(148,163,184,0.35); font-style: italic; }

  .vibe-emoji-big {
    font-size: 54px;
    margin-bottom: 10px;
    display: block;
    animation: float-big 3.5s ease-in-out infinite;
  }
  @keyframes float-big {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-10px) rotate(2deg); }
  }
  .vibe-name-text {
    font-family: 'Lora', Georgia, serif;
    font-size: 34px;
    font-weight: 600;
    color: #e2eaf4;
    margin-bottom: 5px;
  }
  .vibe-score-text {
    font-size: 14px;
    color: rgba(148,163,184,0.5);
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .vibe-desc {
    font-size: 18px;
    line-height: 1.85;
    color: rgba(200,220,240,0.75);
    max-width: 480px;
    margin: 0 auto;
  }

  /* Loading */
  .loading-anim {
    display: flex; gap: 6px; align-items: center; justify-content: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #60a5fa;
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40%          { transform: scale(1);   opacity: 1; }
  }

  /* Footer */
  .footer-note {
    margin-top: 18px;
    text-align: center;
    font-size: 13px;
    color: rgba(100,120,150,0.5);
    letter-spacing: 0.2px;
  }

  /* Meta pills */
  .meta-row {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .meta-pill {
    padding: 4px 10px;
    border: 1px solid rgba(100,150,200,0.12);
    border-radius: 99px;
    font-size: 13px;
    color: rgba(148,163,184,0.5);
    background: rgba(255,255,255,0.02);
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
  }
  .meta-pill:hover {
    transform: translateY(-1px);
    border-color: rgba(96,165,250,0.25);
    background: rgba(59,130,246,0.08);
    color: rgba(191,219,254,0.85);
  }

  @media (max-width: 580px) {
    .card { padding: 24px; }
    .input-row { flex-direction: column; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .card h1 { font-size: 30px; }
    .tagline { font-size: 16px; }
    .chip { font-size: 13px; }
    .input-row input,
    .btn-check { font-size: 16px; }
  }
</style>

<div id="vibeRoot">
  <div class="sky"></div>
  <div class="aurora"></div>
  <div class="fog-layer fog-1"></div>
  <div class="fog-layer fog-2"></div>
  <div class="stars" id="stars"></div>
  <canvas id="rainCanvas"></canvas>
  <div class="condensation"></div>
  <div class="window-frame"></div>
  <div class="warmth-glow"></div>

  <div class="content-wrap">
    <div class="card">
      <div class="header">
        <div class="weather-icon-row">
          <div class="icon-orb rain"   style="--d:3.2s;--delay:0s">🌧️</div>
          <div class="icon-orb cloud"  style="--d:4.1s;--delay:0.6s">☁️</div>
          <div class="icon-orb moon"   style="--d:3.7s;--delay:1.1s">🌙</div>
          <div class="icon-orb coffee" style="--d:4.5s;--delay:0.3s">☕</div>
        </div>
        <h1>Rainy Day Vibe</h1>
        <p class="tagline">find peace in your cozy corner of the world</p>
      </div>

      <div class="meta-row">
        <span class="meta-pill">Live Open-Meteo</span>
        <span class="meta-pill">Cozy mode on</span>
        <span class="meta-pill" id="meta-city">Waiting for city...</span>
      </div>

      <div class="chips" id="chips">
        <span class="chip" onclick="setCity('Montreal')">🍁 Montreal</span>
        <span class="chip" onclick="setCity('Tokyo')">⛩️ Tokyo</span>
        <span class="chip" onclick="setCity('London')">☔ London</span>
        <span class="chip" onclick="setCity('Seattle')">🏔️ Seattle</span>
        <span class="chip" onclick="setCity('Dublin')">🍀 Dublin</span>
        <span class="chip" onclick="setCity('Amsterdam')">🚲 Amsterdam</span>
      </div>

      <div class="input-row">
        <input type="text" id="cityInput" placeholder="Enter your city..." value="Seattle"
               onkeydown="if(event.key==='Enter')checkVibe()">
        <button class="btn-check" id="checkBtn" onclick="checkVibe()">Check Vibe ☕</button>
      </div>

      <div class="stats-grid" id="statsGrid" style="display:none"></div>

      <div class="vibe-box" id="vibeBox">
        <span class="vibe-empty">Enter a city to feel the vibe...</span>
      </div>

      <p class="footer-note">✦ real weather · real feelings · zero urgency ✦</p>
    </div>
  </div>
</div>

<script>
(function() {

  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 110; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.8 + 0.5;
    const minOp = (Math.random() * 0.25 + 0.05).toFixed(2);
    const maxOp = (Math.random() * 0.55 + 0.3).toFixed(2);
    Object.assign(s.style, {
      width: size + 'px', height: size + 'px',
      top: Math.random() * 70 + '%',
      left: Math.random() * 100 + '%',
      '--d': (Math.random() * 4 + 2) + 's',
      '--delay': (Math.random() * 5) + 's',
      '--minOp': minOp,
      '--maxOp': maxOp,
    });
    starsEl.appendChild(s);
  }

  /* ── Rain Canvas ── */
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  let drops = [];
  let W, H;

  function resizeCanvas() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    drops = [];
    for (let i = 0; i < 200; i++) {
      drops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        len: Math.random() * 18 + 6,
        speed: Math.random() * 4 + 3,
        opacity: Math.random() * 0.35 + 0.08,
        width: Math.random() * 0.8 + 0.3,
      });
    }
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawRain() {
    ctx.clearRect(0, 0, W, H);
    drops.forEach(d => {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 2, d.y + d.len);
      ctx.strokeStyle = `rgba(160,210,255,${d.opacity})`;
      ctx.lineWidth = d.width;
      ctx.stroke();
      d.y += d.speed;
      d.x -= 1;
      if (d.y > H + 20) {
        d.y = -d.len;
        d.x = Math.random() * W;
      }
    });
    requestAnimationFrame(drawRain);
  }
  drawRain();

  /* ── Data ── */
  const VIBES = {
    hot_sunny:  { name: "Golden Hour Dreamer",   emoji: "☀️",  score: "79 / 100 cozy" },
    cold_clear: { name: "Crisp Morning Soul",    emoji: "❄️",  score: "82 / 100 cozy" },
    rainy:      { name: "Rainy Day Philosopher", emoji: "🌧️", score: "95 / 100 cozy" },
    snowy:      { name: "Winter Cabin Magic",    emoji: "❄️",  score: "98 / 100 cozy" },
    cloudy:     { name: "Overcast Dreamer",      emoji: "☁️",  score: "88 / 100 cozy" },
    stormy:     { name: "Thunder Meditation",    emoji: "⛈️",  score: "92 / 100 cozy" },
    mild_sunny: { name: "Gentle Afternoon",      emoji: "🌸",  score: "85 / 100 cozy" },
    foggy:      { name: "Misty Wonderland",      emoji: "🌫️", score: "90 / 100 cozy" },
  };

  const GEOCODE = {
    montreal:[45.5017,-73.5673], tokyo:[35.6762,139.6503], london:[51.5074,-0.1278],
    seattle:[47.6062,-122.3321], dublin:[53.3498,-6.2603], amsterdam:[52.3676,4.9041],
    paris:[48.8566,2.3522], berlin:[52.52,13.405], toronto:[43.6532,-79.3832],
    vancouver:[49.2827,-123.1207], portland:[45.5152,-122.6784], stockholm:[59.3293,18.0686],
    copenhagen:[55.6761,12.5683], moscow:[55.7558,37.6173], oslo:[59.9139,10.7522],
    reykjavik:[64.1265,-21.8174], edinburgh:[55.9533,-3.1883],
  };

  function setCity(city) {
    document.getElementById('cityInput').value = city;
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.textContent.toLowerCase().includes(city.toLowerCase()));
    });
  }

  function classifyWeather(temp, precip, cloud, wind) {
    if (precip > 3) return wind > 20 ? 'stormy' : 'rainy';
    if (cloud > 80) return 'cloudy';
    if (cloud > 50 && temp < 10) return 'foggy';
    if (temp > 28 && cloud < 30) return 'hot_sunny';
    if (temp < 0) return 'snowy';
    if (temp < 10 && cloud < 40) return 'cold_clear';
    return 'mild_sunny';
  }

  function vibeText(city, t, p, c, w, vibe) {
    const rain  = p > 2 ? "Rain drums softly on the glass" : "Clouds press low like a wool blanket";
    const temp  = t <= 8 ? "the cold wraps around everything — maximum blanket permissions" : "the air is cool enough for hot tea but warm enough for a slow walk";
    const wind  = w > 20 ? "and the wind is doing something dramatic outside" : "and the breeze sighs through the trees like it has nowhere to be";
    return `${city} is giving ${vibe.name} energy right now. ${rain} at ${c}% cloud cover, ${Math.round(w)} km/h. At ${t}°C, ${temp}, ${wind}. Your assignment: a warm drink, soft lamplight, and zero urgency.`;
  }

  async function checkVibe() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;
    const btn = document.getElementById('checkBtn');
    btn.disabled = true; btn.textContent = 'Sensing...';

    document.getElementById('statsGrid').style.display = 'none';
    document.getElementById('vibeBox').innerHTML = '<div class="loading-anim"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    document.getElementById('meta-city').textContent = city + ' · reading the sky...';

    const key = city.toLowerCase();
    let coords = GEOCODE[key];
    if (!coords) {
      const words = key.split(' ');
      const match = Object.keys(GEOCODE).find(k => words.some(w => k.includes(w)));
      coords = match ? GEOCODE[match] : [40.7128, -74.006];
    }
    const [lat, lon] = coords;

    try {
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,cloudcover,windspeed_10m&timezone=auto`);
      if (!res.ok) throw new Error('weather API error');
      const data = await res.json();
      const cur  = data.current;
      const temp = Math.round(cur.temperature_2m);
      const prec = cur.precipitation;
      const cloud = cur.cloudcover;
      const wind = cur.windspeed_10m;

      const vibeKey = classifyWeather(temp, prec, cloud, wind);
      const vibe = VIBES[vibeKey];

      const sg = document.getElementById('statsGrid');
      sg.style.display = 'grid';
      sg.innerHTML = [
        ['val', 'lbl', temp + '°C', 'Temperature'],
        ['val', 'lbl', cloud + '%', 'Cloud cover'],
        ['val', 'lbl', Math.round(wind) + ' km/h', 'Wind'],
        ['val', 'lbl', prec.toFixed(1) + ' mm', 'Precipitation'],
      ].map(([a,b,v,l]) => `<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('');

      const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      document.getElementById('meta-city').textContent = city + ' · ' + now;

      document.getElementById('vibeBox').innerHTML = `
        <div>
          <span class="vibe-emoji-big">${vibe.emoji}</span>
          <div class="vibe-name-text">${vibe.name}</div>
          <div class="vibe-score-text">${vibe.score}</div>
          <p class="vibe-desc">${vibeText(city, temp, prec, cloud, wind, vibe)}</p>
        </div>`;
    } catch(e) {
      document.getElementById('vibeBox').innerHTML = `<span class="vibe-empty">Couldn't reach the rain radar... try again in a moment.</span>`;
    }
    btn.disabled = false; btn.textContent = 'Check Vibe ☕';
  }

  setCity('Seattle');
  window.setCity = setCity;
  window.checkVibe = checkVibe;
})();
</script>
